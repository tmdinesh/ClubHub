services:
  postgres:
    ports:
      - "5434:5432"

  backend:
    volumes:
      - ./backend:/app
      - media_data:/app/media
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      target: builder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  nginx:
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
